version: 2

project_name: asds

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: asds
    main: ./cmd/asds/
    binary: asds
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: andrew-le-mfv
    name: asds-marketplace-setup
  draft: false
  prerelease: auto
